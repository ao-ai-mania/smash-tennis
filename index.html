<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMASH TENNIS – TV</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --neon: #00ff88;
      --neon2: #00ccff;
      --danger: #ff3355;
      --gold: #ffd700;
      --dark: #050a05;
      --court: #0d2b1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ======== LOBBY ======== */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 40px;
      background: radial-gradient(ellipse at 50% 60%, #0d2b1a 0%, #050a05 70%);
      position: relative;
      overflow: hidden;
    }

    #lobby::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0, 255, 136, 0.03) 60px, rgba(0, 255, 136, 0.03) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0, 255, 136, 0.03) 60px, rgba(0, 255, 136, 0.03) 61px);
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(3rem, 8vw, 7rem);
      color: var(--neon);
      text-shadow: 0 0 30px #00ff88aa, 0 0 80px #00ff8844;
      letter-spacing: 0.15em;
      animation: logoPulse 4s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    .logo span {
      color: #fff;
    }

    @keyframes logoPulse {

      0%,
      100% {
        text-shadow: 0 0 30px #00ff88aa, 0 0 80px #00ff8844;
      }

      50% {
        text-shadow: 0 0 50px #00ff88cc, 0 0 120px #00ff8866, 0 0 200px #00ff8822;
      }
    }

    .lobby-row {
      display: flex;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .qr-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .qr-frame {
      padding: 16px;
      background: #fff;
      border-radius: 8px;
      border: 3px solid var(--neon);
      box-shadow: 0 0 30px #00ff8844, inset 0 0 20px rgba(0, 255, 136, 0.05);
    }

    #qr-code {
      width: 180px;
      height: 180px;
    }

    .qr-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--neon);
      text-transform: uppercase;
    }

    .qr-url {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.4);
      max-width: 220px;
      text-align: center;
      word-break: break-all;
    }

    .divider {
      width: 1px;
      height: 220px;
      background: linear-gradient(to bottom, transparent, var(--neon), transparent);
      opacity: 0.4;
    }

    .theme-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 220px;
    }

    .theme-info {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.3);
    }

    .theme-btn {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      text-align: left;
    }

    .theme-btn:hover {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--neon);
    }

    .theme-btn.active {
      background: rgba(0, 255, 136, 0.2);
      border-color: var(--neon);
      color: var(--neon);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
    }

    .peer-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 280px;
    }

    .peer-info {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.3);
    }

    .peer-id-display {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: var(--neon);
      background: rgba(0, 255, 136, 0.06);
      border: 1px solid rgba(0, 255, 136, 0.3);
      padding: 10px 16px;
      border-radius: 4px;
      letter-spacing: 0.1em;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 4px;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      transition: all 0.5s;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      transition: all 0.3s;
    }

    .status-waiting .status-dot {
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
      animation: blink 1.2s infinite;
    }

    .status-connected .status-dot {
      background: var(--neon);
      box-shadow: 0 0 10px var(--neon);
    }

    .status-waiting {
      background: rgba(255, 215, 0, 0.08);
      border: 1px solid rgba(255, 215, 0, 0.25);
      color: var(--gold);
    }

    .status-connected {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.35);
      color: var(--neon);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .start-btn {
      padding: 16px 32px;
      background: var(--neon);
      color: var(--dark);
      border: none;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: all 0.2s;
      opacity: 0.4;
      pointer-events: none;
    }

    .start-btn.active {
      opacity: 1;
      pointer-events: all;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
    }

    .start-btn.active:hover {
      transform: scale(1.03);
      box-shadow: 0 0 50px rgba(0, 255, 136, 0.7);
    }

    .hint {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      line-height: 1.8;
    }

    /* ======== GAME ======== */
    #game-container {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .hud-block {
      font-family: 'Orbitron', monospace;
    }

    .hud-label {
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
    }

    .hud-val {
      font-size: clamp(2rem, 4.5vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
    }

    .hud-sub {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
    }

    #score-val {
      color: var(--neon);
      text-shadow: 0 0 20px #00ff8888;
    }

    #streak-val {
      color: var(--neon2);
      text-shadow: 0 0 20px #00ccff88;
      text-align: right;
    }

    .lives-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .life-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
      transition: all 0.3s;
    }

    .life-dot.lost {
      background: #333;
      box-shadow: none;
    }

    /* CENTER MESSAGES */
    #msg-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 900;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    /* SWEET SPOT ARC at bottom */
    #sweet-zone {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      pointer-events: none;
      z-index: 15;
    }

    /* SPEED METER */
    #speed-meter {
      position: absolute;
      bottom: 24px;
      right: 40px;
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.35);
      z-index: 10;
      text-align: right;
    }

    .speed-track {
      width: 120px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }

    .speed-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon), var(--gold), var(--danger));
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s;
    }

    /* CONTROLLER BADGE */
    #ctrl-badge {
      position: absolute;
      bottom: 24px;
      left: 40px;
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--neon);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 8px var(--neon);
      animation: blink 2s infinite;
    }

    /* GAME OVER */
    #gameover {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(10px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 28px;
    }

    #gameover.show {
      display: flex;
    }

    .go-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--danger);
      text-shadow: 0 0 40px #ff335588;
      letter-spacing: 0.1em;
    }

    .go-score {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.2em;
    }

    .go-btn {
      padding: 14px 48px;
      background: transparent;
      border: 2px solid var(--neon);
      color: var(--neon);
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.2s;
    }

    .go-btn:hover {
      background: var(--neon);
      color: var(--dark);
      box-shadow: 0 0 30px #00ff8866;
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 30;
    }
  </style>
</head>

<body>

  <!-- LOBBY -->
  <div id="lobby">
    <div class="logo">SMASH<span> 🎾</span></div>

    <div class="lobby-row">
      <div class="qr-panel">
        <div class="qr-frame">
          <div id="qr-code"></div>
        </div>
        <div class="qr-label">📱 QRコードをスキャン</div>
        <div class="qr-url" id="qr-url-text">接続ID生成中...</div>
      </div>

      <div class="divider"></div>

      <div class="theme-panel">
        <div class="theme-info">LANDSCAPE</div>
        <button class="theme-btn active" onclick="setTheme('japan')" id="theme-japan">Japan Scenery</button>
        <button class="theme-btn" onclick="setTheme('neon')" id="theme-neon">Neon Court</button>
        <button class="theme-btn" onclick="setTheme('cyber')" id="theme-cyber">Cyber Space</button>
        <button class="theme-btn" onclick="setTheme('sunset')" id="theme-sunset">Sunset Beach</button>
      </div>

      <div class="divider"></div>

      <div class="peer-panel">
        <div class="peer-info">ROOM ID</div>
        <div class="peer-id-display" id="peer-id-display">生成中...</div>

        <div class="status-bar status-waiting" id="status-bar">
          <div class="status-dot"></div>
          <span id="status-text">コントローラーを待機中...</span>
        </div>

        <button class="start-btn" id="start-btn" onclick="startGame()">▶ GAME START</button>

        <div class="hint">
          スマホで上のQRコードを読み取ると<br>
          コントローラーとして接続されます
        </div>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-container">
    <canvas id="c"></canvas>

    <div id="hud">
      <div class="hud-block">
        <div class="hud-label">SCORE</div>
        <div class="hud-val" id="score-val">0</div>
        <div class="hud-sub" id="set-val">SET 0</div>
      </div>
      <div class="hud-block" style="text-align:right">
        <div class="hud-label">STREAK</div>
        <div class="hud-val" id="streak-val">0</div>
        <div class="lives-row" id="lives-row" style="justify-content:flex-end">
          <div class="life-dot" id="l2"></div>
          <div class="life-dot" id="l1"></div>
          <div class="life-dot" id="l0"></div>
        </div>
        <button id="quit-btn" onclick="location.reload()"
          style="margin-top:10px; padding:6px 12px; background:transparent; border:1px solid var(--danger); color:var(--danger); border-radius:4px; font-family:'Rajdhani', sans-serif; font-weight:bold; cursor:pointer; width:100%;">やめる</button>
      </div>
    </div>

    <div id="msg-layer"></div>

    <canvas id="sweet-zone-canvas"
      style="position:absolute;bottom:0;left:0;width:100%;height:140px;pointer-events:none;z-index:15;"></canvas>

    <div id="speed-meter">
      BALL SPEED
      <div class="speed-track">
        <div class="speed-fill" id="speed-fill"></div>
      </div>
    </div>

    <div id="ctrl-badge">
      <div class="ctrl-dot"></div>
      CONTROLLER LIVE
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="gameover">
    <div class="go-title">GAME OVER</div>
    <div class="go-score" id="go-score">FINAL SCORE: 0</div>
    <button class="go-btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>

  <script>
    // ====== SOUND ASSETS ======
    const sfx_hit1 = new Audio('sounds_racket1.mp3');
    const sfx_hit2 = new Audio('sounds_racket2.mp3');
    const sfx_swing = new Audio('sounds_swing.mp3');

    function playSound(type) {
      if (type === 'hit') {
        const h = Math.random() > 0.5 ? sfx_hit1 : sfx_hit2;
        h.currentTime = 0;
        h.play().catch(() => { });
      } else if (type === 'swing') {
        sfx_swing.currentTime = 0;
        sfx_swing.play().catch(() => { });
      } else if (type === 'miss') {
        // Fallback or keep short synth for miss since it's gamey
        try {
          const t = audioCtx.currentTime;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, t);
          osc.frequency.exponentialRampToValueAtTime(50, t + 0.4);
          gain.gain.setValueAtTime(0.3, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
          osc.start(t);
          osc.stop(t + 0.4);
        } catch (e) { }
      } else if (type === 'serve') {
        playSound('swing');
      }
    }

    // ====== IMAGE ASSETS ======
    const img_bg = new Image();
    img_bg.src = 'japan_bg.png';
    const img_ball = new Image();
    img_ball.src = 'tennis_ball.png';

    // ====== PEER SETUP ======
    let peer, conn;
    let myPeerId = '';

    function initPeer() {
      peer = new Peer(undefined, {
        host: '0.peerjs.com', port: 443, secure: true,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
      });

      peer.on('open', id => {
        myPeerId = id;
        document.getElementById('peer-id-display').textContent = id;
        generateQR(id);
      });

      peer.on('connection', c => {
        conn = c;
        conn.on('data', onControllerData);
        conn.on('open', () => {
          setStatus(true);
          document.getElementById('start-btn').classList.add('active');
        });
        conn.on('close', () => setStatus(false));
      });

      peer.on('error', e => {
        console.warn('PeerJS error:', e);
        // Fallback: use a manual room code approach
        const fallbackId = Math.random().toString(36).slice(2, 8).toUpperCase();
        document.getElementById('peer-id-display').textContent = fallbackId + ' (オフライン)';
        document.getElementById('start-btn').classList.add('active');
      });
    }

    function generateQR(peerId) {
      let basePath = location.pathname;
      if (basePath.endsWith('tv.html') || basePath.endsWith('index.html')) {
        basePath = basePath.replace(/(tv\.html|index\.html)$/, '');
      }
      if (!basePath.endsWith('/')) basePath += '/';

      const phoneUrl = `${location.origin}${basePath}phone.html?peer=${peerId}`;
      document.getElementById('qr-url-text').textContent = phoneUrl;

      new QRCode(document.getElementById('qr-code'), {
        text: phoneUrl,
        width: 180, height: 180,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    function setStatus(connected) {
      const bar = document.getElementById('status-bar');
      const txt = document.getElementById('status-text');
      if (connected) {
        bar.className = 'status-bar status-connected';
        txt.textContent = '✓ コントローラー接続完了';
      } else {
        bar.className = 'status-bar status-waiting';
        txt.textContent = 'コントローラーを待機中...';
        document.getElementById('start-btn').classList.remove('active');
      }
    }

    // ====== THEMES ======
    const themes = {
      japan: {
        skyTop: '#0a1128', skyBot: '#1c0f2a',
        horizon: 'rgba(255,105,180,0.6)',
        courtTop: '#2a3a29', courtMid: '#1e2b1d', courtBot: '#111a10',
        lines: 'rgba(255,183,197,0.4)',
        netGlow: '#ffb7c5',
        starBase: '#ffb7c5', starAlt: '#ff69b4',
        particleMain: '#ff69b4'
      },
      neon: {
        skyTop: '#020b0a', skyBot: '#061a12',
        horizon: 'rgba(0,255,136,0.35)',
        courtTop: '#0d2b1a', courtMid: '#0f3320', courtBot: '#071a10',
        lines: 'rgba(0,255,136,0.25)',
        netGlow: '#00ff88',
        starBase: '#fff', starAlt: '#00ff88',
        particleMain: '#00ff88'
      },
      cyber: {
        skyTop: '#050014', skyBot: '#1a0033',
        horizon: 'rgba(204,0,255,0.4)',
        courtTop: '#0a001a', courtMid: '#140033', courtBot: '#05000d',
        lines: 'rgba(0,204,255,0.4)',
        netGlow: '#cc00ff',
        starBase: '#00ccff', starAlt: '#cc00ff',
        particleMain: '#00ccff'
      },
      sunset: {
        skyTop: '#2b0f4c', skyBot: '#cc4400',
        horizon: 'rgba(255,215,0,0.5)',
        courtTop: '#261109', courtMid: '#401d0f', courtBot: '#1a0b06',
        lines: 'rgba(255,215,0,0.3)',
        netGlow: '#ffaa00',
        starBase: '#ffd700', starAlt: '#ff5500',
        particleMain: '#ffd700'
      }
    };
    let currentTheme = 'japan';

    function setTheme(name) {
      currentTheme = name;
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('theme-' + name).classList.add('active');
      // Update CSS vars for HUD
      const t = themes[name];
      document.documentElement.style.setProperty('--neon', t.particleMain);
    }

    // ====== GAME STATE ======
    let gs = { score: 0, streak: 0, lives: 3, running: false };
    let ball = { x: 0.5, y: 0.42, z: 0, vz: 0.009, visible: false };
    let particles = [];
    let msgTimeout = null;
    let animId = null;
    let C, ctx, SZ, szCtx;
    let sweetZoneActive = false;
    let swingReceived = false;

    function startGame() {
      initAudio();
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-container').style.display = 'block';

      C = document.getElementById('c');
      ctx = C.getContext('2d');
      SZ = document.getElementById('sweet-zone-canvas');
      szCtx = SZ.getContext('2d');

      function resize() {
        C.width = window.innerWidth;
        C.height = window.innerHeight;
        SZ.width = window.innerWidth;
        SZ.height = 140;
      }
      resize();
      window.addEventListener('resize', resize);

      // Keyboard fallback
      document.addEventListener('keydown', e => {
        if ((e.code === 'Space' || e.code === 'ArrowUp') && gs.running) {
          e.preventDefault();
          handleSwing(0.85);
        }
      });

      gs = { score: 0, streak: 0, lives: 3, running: true };
      updateHUD();
      setTimeout(serve, 1500);
      requestAnimationFrame(loop);
    }

    function serve() {
      if (!gs.running) return;
      const spd = Math.min(0.007 + gs.score * 0.00015, 0.024);
      ball = {
        x: 0.38 + Math.random() * 0.24,
        y: 0.36 + Math.random() * 0.16,
        z: 0,
        vz: spd,
        visible: true,
        phase: 'incoming',
      };
      swingReceived = false;
      sweetZoneActive = false;
      playSound('serve');
      document.getElementById('speed-fill').style.width = Math.min((spd / 0.024) * 100, 100) + '%';
    }

    function onControllerData(data) {
      if (data.type === 'trigger_swing_sound') {
        playSound('swing');
      }
      if (data.type === 'swing' && gs.running && ball.visible) {
        handleSwing(data.power || 0.75);
      }
    }

    function handleSwing(power) {
      if (!ball.visible || ball.phase !== 'incoming') return;
      if (swingReceived) return;

      if (ball.z > 0.58) {
        // HIT!
        swingReceived = true;
        const bonus = Math.floor(power * 25);
        gs.score += 10 + bonus + gs.streak * 5;
        gs.streak++;

        ball.phase = 'outgoing';
        ball.vz = -Math.min(Math.abs(ball.vz) * 1.05, 0.035);

        playSound('hit');
        spawnParticles(ball.x * C.width, ball.y * C.height, themes[currentTheme].particleMain);
        showMsg(hitMsg(), themes[currentTheme].particleMain);
        updateHUD();
        if (conn) conn.send({ type: 'result', result: 'hit', score: gs.score });
      } else if (ball.z > 0.25) {
        showMsg('EARLY!', '#ffd700');
      }
    }

    function hitMsg() {
      const msgs = ['NICE!', 'GOOD!', 'GREAT!', 'SUPER!', 'SMASH!!', 'ACE!!!'];
      return msgs[Math.min(gs.streak - 1, msgs.length - 1)];
    }

    function ballMissed() {
      if (ball.phase === 'missed') return;
      ball.phase = 'missed';
      ball.visible = false;
      gs.streak = 0;
      gs.lives--;
      playSound('miss');
      showMsg('MISS', '#ff3355');
      updateHUD();
      if (conn) conn.send({ type: 'result', result: 'miss' });
      if (gs.lives <= 0) { setTimeout(endGame, 900); }
      else { setTimeout(serve, 1400); }
    }

    function showMsg(text, color) {
      const el = document.getElementById('msg-layer');
      el.textContent = text;
      el.style.color = color;
      el.style.textShadow = `0 0 40px ${color}99`;
      el.style.opacity = '1';
      el.style.transform = 'translate(-50%,-50%) scale(1.1)';
      el.style.transition = 'none';
      if (msgTimeout) clearTimeout(msgTimeout);
      msgTimeout = setTimeout(() => {
        el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        el.style.opacity = '0';
        el.style.transform = 'translate(-50%,-50%) scale(0.85)';
      }, 700);
    }

    function updateHUD() {
      document.getElementById('score-val').textContent = gs.score;
      document.getElementById('streak-val').textContent = gs.streak;
      document.getElementById('set-val').textContent = `SET ${Math.floor(gs.score / 100)}`;
      [0, 1, 2].forEach(i => {
        const d = document.getElementById('l' + i);
        d.classList.toggle('lost', i >= gs.lives);
      });
    }

    function endGame() {
      gs.running = false;
      document.getElementById('go-score').textContent = `FINAL SCORE: ${gs.score}`;
      document.getElementById('gameover').classList.add('show');
      if (conn) conn.send({ type: 'gameover', score: gs.score });
    }

    function restartGame() {
      document.getElementById('gameover').classList.remove('show');
      gs = { score: 0, streak: 0, lives: 3, running: true };
      particles = [];
      updateHUD();
      setTimeout(serve, 1000);
    }

    // ====== PARTICLES ======
    function spawnParticles(x, y, color) {
      for (let i = 0; i < 40; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 14;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 5,
          life: 1,
          r: 2 + Math.random() * 4,
          col: Math.random() > 0.5 ? color : '#fff',
        });
      }
    }

    // ====== RENDER LOOP ======
    function loop() {
      if (!C) { animId = requestAnimationFrame(loop); return; }
      ctx.clearRect(0, 0, C.width, C.height);

      drawScene();

      if (ball.visible) {
        ball.z += ball.vz;
        // gentle drift to center
        ball.x += (0.5 - ball.x) * 0.004;
        ball.y += (0.44 - ball.y) * 0.004;

        if (ball.phase === 'outgoing' && ball.z < 0) {
          // CPU Hit
          ball.phase = 'incoming';
          ball.vz = Math.abs(ball.vz) + 0.0005;
          ball.x = 0.38 + Math.random() * 0.24;
          ball.y = 0.36 + Math.random() * 0.16;
          playSound('hit');
          spawnParticles((0.5) * C.width, (H * 0.44), themes[currentTheme].particleMain);
          swingReceived = false;
          document.getElementById('speed-fill').style.width = Math.min((ball.vz / 0.035) * 100, 100) + '%';
        }

        const bx = ball.x * C.width;
        const by = ball.y * C.height;
        const bs = 5 + ball.z * 90;

        // Shadow on court floor
        const shadowY = C.height * 0.79;
        const shadowA = ball.z * 0.55;
        ctx.save();
        ctx.globalAlpha = shadowA;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(bx, shadowY, bs * 0.7, bs * 0.22, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Zone glow when near
        if (ball.phase === 'incoming' && ball.z > 0.55) {
          sweetZoneActive = true;
          const pulse = 0.3 + Math.sin(Date.now() * 0.025) * 0.2;
          ctx.save();
          ctx.globalAlpha = pulse * (ball.z - 0.55) * 2;
          const g = ctx.createRadialGradient(bx, by, 0, bx, by, bs * 3.5);
          g.addColorStop(0, 'rgba(0,255,136,0.5)');
          g.addColorStop(1, 'rgba(0,255,136,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(bx, by, bs * 3.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else {
          sweetZoneActive = false;
        }

        // Ball
        if (currentTheme === 'japan' && img_ball.complete) {
          // Draw image
          ctx.save();
          // Use green screen chroma-key trick if necessary, or just clip. 
          // Best is to assume a rounded clip since we know tennis balls are round.
          ctx.beginPath();
          ctx.arc(bx, by, bs, 0, Math.PI * 2);
          ctx.clip();
          ctx.drawImage(img_ball, bx - bs, by - bs, bs * 2, bs * 2);
          ctx.restore();
        } else {
          // Fallback drawn ball
          const bg = ctx.createRadialGradient(bx - bs * 0.3, by - bs * 0.3, 0, bx, by, bs);
          bg.addColorStop(0, '#fffff0');
          bg.addColorStop(0.35, '#e8d44d');
          bg.addColorStop(1, '#b89800');
          ctx.beginPath();
          ctx.arc(bx, by, bs, 0, Math.PI * 2);
          ctx.fillStyle = bg;
          ctx.fill();

          // Seam
          ctx.save();
          ctx.globalAlpha = 0.25;
          ctx.strokeStyle = '#806000';
          ctx.lineWidth = bs * 0.12;
          ctx.beginPath();
          ctx.arc(bx, by, bs * 0.72, 0.4, Math.PI + 0.4);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(bx, by, bs * 0.72, Math.PI + 0.4, 0.4 + Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        // Hit ring indicator
        if (ball.phase === 'incoming' && ball.z > 0.5) {
          const ringA = Math.min((ball.z - 0.5) * 2, 0.7);
          ctx.save();
          ctx.globalAlpha = ringA;
          ctx.strokeStyle = '#00ff88';
          ctx.lineWidth = 2;
          ctx.setLineDash([8, 6]);
          ctx.lineDashOffset = -Date.now() * 0.05;
          ctx.beginPath();
          ctx.arc(bx, by, bs * 1.9, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        if (ball.phase === 'incoming' && ball.z > 1.08) ballMissed();
      }

      // Particles
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.55; p.life -= 0.035;
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.col;
        ctx.shadowColor = p.col;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      // Sweet zone bar at bottom
      drawSweetZone();

      animId = requestAnimationFrame(loop);
    }

    function drawSweetZone() {
      szCtx.clearRect(0, 0, SZ.width, SZ.height);
      const w = SZ.width, h = SZ.height;

      // Racket silhouette at bottom
      const cx = w * 0.5, cy = h - 10;

      // Handle
      szCtx.strokeStyle = '#8B4513';
      szCtx.lineWidth = 8;
      szCtx.lineCap = 'round';
      szCtx.beginPath();
      szCtx.moveTo(cx, cy - 10);
      szCtx.lineTo(cx, cy - 60);
      szCtx.stroke();

      // Frame
      szCtx.strokeStyle = sweetZoneActive ? '#00ff88' : 'rgba(255,255,255,0.6)';
      szCtx.lineWidth = sweetZoneActive ? 4 : 3;
      if (sweetZoneActive) szCtx.shadowColor = '#00ff88', szCtx.shadowBlur = 12;
      szCtx.beginPath();
      szCtx.ellipse(cx, cy - 105, 38, 52, 0, 0, Math.PI * 2);
      szCtx.stroke();
      szCtx.shadowBlur = 0;

      // Strings
      szCtx.strokeStyle = sweetZoneActive ? 'rgba(0,255,136,0.5)' : 'rgba(255,255,255,0.18)';
      szCtx.lineWidth = 0.8;
      for (let i = -4; i <= 4; i++) {
        szCtx.beginPath(); szCtx.moveTo(cx + i * 8.5, cy - 157); szCtx.lineTo(cx + i * 8.5, cy - 53); szCtx.stroke();
      }
      for (let i = -5; i <= 5; i++) {
        szCtx.beginPath(); szCtx.moveTo(cx - 36, cy - 105 + i * 9.5); szCtx.lineTo(cx + 36, cy - 105 + i * 9.5); szCtx.stroke();
      }

      // SWING prompt
      if (sweetZoneActive) {
        szCtx.font = 'bold 13px Orbitron, monospace';
        szCtx.fillStyle = '#00ff88';
        szCtx.globalAlpha = 0.7 + Math.sin(Date.now() * 0.01) * 0.3;
        szCtx.textAlign = 'center';
        szCtx.fillText('▲ NOW! ▲', cx, 24);
        szCtx.globalAlpha = 1;
      }
    }

    function drawScene() {
      const W = C.width, H = C.height;
      const t = themes[currentTheme];

      // Sky
      const sky = ctx.createLinearGradient(0, 0, 0, H * 0.52);
      sky.addColorStop(0, t.skyTop);
      sky.addColorStop(1, t.skyBot);
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H * 0.52);

      // Stars
      ctx.save();
      for (let i = 0; i < 70; i++) {
        const sx = (i * 173.3) % W;
        const sy = (i * 61.7) % (H * 0.46);
        const sa = 0.2 + Math.sin(Date.now() * 0.0008 + i) * 0.25;
        ctx.globalAlpha = Math.max(0, sa);
        ctx.fillStyle = i % 5 === 0 ? t.starAlt : t.starBase;
        const sr = i % 7 === 0 ? 1.2 : 0.7;
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();

      // Horizon neon glow
      const hY = H * 0.505;
      const hg = ctx.createLinearGradient(0, hY - 40, 0, hY + 30);
      hg.addColorStop(0, 'transparent');
      hg.addColorStop(0.5, t.horizon);
      hg.addColorStop(1, 'transparent');
      ctx.fillStyle = hg;
      ctx.fillRect(0, hY - 40, W, 70);

      if (currentTheme === 'japan') {
        // Draw photorealistic japan sunset layer
        if (img_bg.complete) {
          ctx.drawImage(img_bg, 0, 0, W, H);
        }
      } else {
        // Court
        const cg = ctx.createLinearGradient(0, H * 0.5, 0, H);
        cg.addColorStop(0, t.courtTop);
        cg.addColorStop(0.5, t.courtMid);
        cg.addColorStop(1, t.courtBot);
        ctx.fillStyle = cg;
        ctx.fillRect(0, H * 0.5, W, H * 0.5);

        // Court grid lines with perspective
        const vp = { x: W * 0.5, y: H * 0.5 };
        ctx.save();

        // Sidelines
        ctx.strokeStyle = t.lines;
        ctx.lineWidth = 1.5;
        [[0.04, 0.96], [0.1, 0.9], [0.2, 0.8]].forEach(([l, r]) => {
          ctx.beginPath();
          ctx.moveTo(vp.x, vp.y);
          ctx.lineTo(W * l, H);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(vp.x, vp.y);
          ctx.lineTo(W * r, H);
          ctx.stroke();
        });

        // Horizontal lines
        for (let d = 0; d < 10; d++) {
          const t_line = (d + 1) / 11;
          const y = vp.y + (H - vp.y) * (t_line * t_line * 0.9 + t_line * 0.1);
          const spread = W * 0.46 * t_line;
          ctx.globalAlpha = 0.08 + t_line * 0.14;
          ctx.beginPath();
          ctx.moveTo(vp.x - spread, y);
          ctx.lineTo(vp.x + spread, y);
          ctx.stroke();
        }

        // Center
        ctx.globalAlpha = 0.15;
        ctx.beginPath();
        ctx.moveTo(vp.x, vp.y);
        ctx.lineTo(vp.x, H);
        ctx.stroke();

        // Net
        ctx.globalAlpha = 1;
        const netY = H * 0.63;
        const netW = W * 0.3;

        // Net shadow
        ctx.shadowColor = t.netGlow;
        ctx.shadowBlur = 12;
        ctx.strokeStyle = 'rgba(255,255,255,0.85)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(vp.x - netW, netY);
        ctx.lineTo(vp.x + netW, netY);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Net mesh
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = 0.5;
        const nH = 20;
        for (let i = 0; i <= 18; i++) {
          const nx = vp.x - netW + (netW * 2) * (i / 18);
          ctx.beginPath(); ctx.moveTo(nx, netY); ctx.lineTo(nx, netY + nH); ctx.stroke();
        }
        for (let i = 0; i <= 3; i++) {
          ctx.beginPath(); ctx.moveTo(vp.x - netW, netY + nH * i / 3); ctx.lineTo(vp.x + netW, netY + nH * i / 3); ctx.stroke();
        }
        ctx.restore();
      }

      // Court
      const cg = ctx.createLinearGradient(0, H * 0.5, 0, H);
      cg.addColorStop(0, t.courtTop);
      cg.addColorStop(0.5, t.courtMid);
      cg.addColorStop(1, t.courtBot);
      ctx.fillStyle = cg;
      ctx.fillRect(0, H * 0.5, W, H * 0.5);

      // Court grid lines with perspective
      const vp = { x: W * 0.5, y: H * 0.5 };
      ctx.save();

      // Sidelines
      ctx.strokeStyle = t.lines;
      ctx.lineWidth = 1.5;
      [[0.04, 0.96], [0.1, 0.9], [0.2, 0.8]].forEach(([l, r]) => {
        ctx.beginPath();
        ctx.moveTo(vp.x, vp.y);
        ctx.lineTo(W * l, H);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(vp.x, vp.y);
        ctx.lineTo(W * r, H);
        ctx.stroke();
      });

      // Horizontal lines
      for (let d = 0; d < 10; d++) {
        const t = (d + 1) / 11;
        const y = vp.y + (H - vp.y) * (t * t * 0.9 + t * 0.1);
        const spread = W * 0.46 * t;
        ctx.globalAlpha = 0.08 + t * 0.14;
        ctx.beginPath();
        ctx.moveTo(vp.x - spread, y);
        ctx.lineTo(vp.x + spread, y);
        ctx.stroke();
      }

      // Center
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      ctx.moveTo(vp.x, vp.y);
      ctx.lineTo(vp.x, H);
      ctx.stroke();

      // Net
      ctx.globalAlpha = 1;
      const netY = H * 0.63;
      const netW = W * 0.3;

      // Net shadow
      ctx.shadowColor = t.netGlow;
      ctx.shadowBlur = 12;
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(vp.x - netW, netY);
      ctx.lineTo(vp.x + netW, netY);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Net mesh
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 0.5;
      const nH = 20;
      for (let i = 0; i <= 18; i++) {
        const nx = vp.x - netW + (netW * 2) * (i / 18);
        ctx.beginPath(); ctx.moveTo(nx, netY); ctx.lineTo(nx, netY + nH); ctx.stroke();
      }
      for (let i = 0; i <= 3; i++) {
        ctx.beginPath(); ctx.moveTo(vp.x - netW, netY + nH * i / 3); ctx.lineTo(vp.x + netW, netY + nH * i / 3); ctx.stroke();
      }
      ctx.restore();

      // Crowd silhouettes
      const crowdY = H * 0.49;
      ctx.save();
      for (let i = 0; i < 90; i++) {
        const hue = 160 + ((i * 37) % 40);
        const light = 6 + ((i * 11) % 10);
        ctx.fillStyle = `hsl(${hue},30%,${light}%)`;
        const cw = W / 90;
        const ch = 12 + Math.sin(i * 2.1) * 6 + Math.sin(Date.now() * 0.0004 + i) * 2;
        ctx.fillRect(i * cw, crowdY - ch, cw + 0.5, ch);
      }
      ctx.restore();

      // Spotlight beams
      ctx.save();
      [[0.1, t.lines], [0.9, t.lines]].forEach(([px, col]) => {
        // Modify slightly to be very transparent for the beam
        const sg = ctx.createLinearGradient(0, 0, 0, H * 0.5);
        sg.addColorStop(0, col);
        sg.addColorStop(1, 'transparent');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.moveTo(W * px, 0);
        ctx.lineTo(W * px - 120, H * 0.5);
        ctx.lineTo(W * px + 120, H * 0.5);
        ctx.fill();
      });
      ctx.restore();

      // Dark vignette
      const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.85);
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(1, 'rgba(0,0,0,0.55)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);
    }

    // ====== INIT ======
    initPeer();
  </script>
</body>
