<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SMASH – ラケット</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@700;900&display=swap');

    :root {
      --gold: #f5c842;
      --green: #6ef0a0;
      --danger: #e03030;
      --dark: #0a0a0a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      user-select: none;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
    }

    .screen.active {
      display: flex;
    }

    /* ===== SWING TEST SCREEN ===== */
    #screen-test {
      justify-content: center;
      gap: 24px;
      padding: 32px 24px;
      background: radial-gradient(ellipse at 50% 0%, #1a3020 0%, #0a0a0a 65%);
    }

    .test-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      letter-spacing: 0.1em;
    }

    .test-subtitle {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      line-height: 1.7;
    }

    .accel-display {
      width: 100%;
      max-width: 300px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
    }

    .accel-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 10px;
      text-align: center;
    }

    .swing-meter-wrap {
      position: relative;
      height: 16px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .swing-meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3a7 40%, var(--gold) 75%, var(--danger));
      border-radius: 8px;
      transition: width 0.04s;
    }

    .swing-meter-thresh {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 30%;
      /* represents threshold */
      width: 2px;
      background: rgba(255, 255, 255, 0.5);
    }

    .swing-val {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 900;
      text-align: center;
      color: #fff;
      margin: 6px 0;
      letter-spacing: 0.05em;
    }

    .swing-status {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      min-height: 1.2em;
    }

    .swing-status.detected {
      color: var(--green);
      font-weight: 700;
    }

    .test-ok-btn {
      padding: 14px 40px;
      background: var(--gold);
      color: #111;
      border: none;
      border-radius: 10px;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(245, 200, 66, 0.4);
      transition: all 0.2s;
    }

    .test-ok-btn:active {
      transform: scale(0.96);
    }

    .perm-btn {
      padding: 12px 28px;
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    .conn-status {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .conn-status.waiting {
      background: rgba(245, 200, 66, 0.1);
      border: 1px solid rgba(245, 200, 66, 0.4);
      color: var(--gold);
    }

    .conn-status.connected {
      background: rgba(110, 240, 160, 0.1);
      border: 1px solid rgba(110, 240, 160, 0.4);
      color: var(--green);
    }

    .conn-status.error {
      background: rgba(224, 48, 48, 0.1);
      border: 1px solid rgba(224, 48, 48, 0.4);
      color: var(--danger);
    }

    .cs-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 1.2s infinite;
    }

    .conn-status.connected .cs-dot {
      animation: none;
      box-shadow: 0 0 5px currentColor;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }

    /* ===== PLAY SCREEN ===== */
    #screen-play {
      justify-content: flex-start;
      padding: 0;
      overflow: hidden;
    }

    #racket-bg {
      position: absolute;
      inset: 0;
      background-image: url('racket.png');
      background-size: cover;
      background-position: center bottom;
      /* Darken to not be too distracting */
      filter: brightness(0.6) saturate(0.9);
      transition: transform 0.08s ease-out, filter 0.15s;
      transform-origin: bottom center;
    }

    #racket-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5) 0%, transparent 35%, transparent 60%, rgba(0, 0, 0, 0.7) 100%);
    }

    /* Top HUD */
    .play-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .play-brand {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.15em;
    }

    .quit-btn-small {
      background: transparent;
      border: 1px solid rgba(255, 100, 100, 0.5);
      color: rgba(255, 120, 120, 0.8);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* Score area */
    .play-score-area {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }

    .play-score-num {
      font-family: 'Orbitron', monospace;
      font-size: 3rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 20px rgba(245, 200, 66, 0.4), 0 4px 16px rgba(0, 0, 0, 0.8);
      transition: color 0.2s;
    }

    .play-score-num.hit {
      color: var(--gold);
    }

    .play-score-num.miss {
      color: var(--danger);
    }

    .play-score-lbl {
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 3px;
    }

    /* Big swing indicator */
    .swing-pulse {
      position: absolute;
      bottom: 150px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: all 0.12s;
      cursor: pointer;
      background: radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.08), transparent 70%);
    }

    .swing-pulse.ready {
      border-color: var(--gold);
      box-shadow: 0 0 32px rgba(245, 200, 66, 0.45), inset 0 0 24px rgba(245, 200, 66, 0.1);
    }

    .swing-pulse.swung {
      transform: translateX(-50%) scale(0.9);
      border-color: #fff;
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
    }

    .swing-emoji {
      font-size: 3.8rem;
      pointer-events: none;
    }

    .swing-hint {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      pointer-events: none;
    }

    /* Power bar */
    .power-bar-wrap {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      z-index: 10;
    }

    .power-bar-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
      margin-bottom: 5px;
    }

    .power-bar-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .power-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3a7 40%, var(--gold) 75%, var(--danger));
      border-radius: 3px;
      transition: width 0.05s;
    }

    /* Result flash */
    #result-flash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 4.5rem;
      font-weight: 900;
      pointer-events: none;
      opacity: 0;
      z-index: 100;
      letter-spacing: 0.05em;
    }

    /* Tilt indicator dots */
    #tilt-indicator {
      position: absolute;
      bottom: 60px;
      right: 20px;
      z-index: 10;
      opacity: 0.5;
    }

    /* D-pad buttons */
    .dpad-btn {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active {
      background: rgba(245, 200, 66, 0.4);
      border-color: var(--gold);
    }

    /* Phone mode selector buttons */
    .mode-btn {
      padding: 10px 8px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.75);
      border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active {
      background: rgba(245, 200, 66, 0.18);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 700;
    }

    .mode-btn:active {
      transform: scale(0.96);
    }

    .tilt-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.45rem;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.4);
      text-align: right;
      margin-bottom: 4px;
    }

    .tilt-bar {
      width: 60px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin: 3px 0;
      overflow: visible;
      position: relative;
    }

    .tilt-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gold);
      position: absolute;
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      transition: left 0.08s;
    }
  </style>
</head>

<body>

  <!-- ===== SWING TEST SCREEN ===== -->
  <div id="screen-test" class="screen active">
    <div class="conn-status waiting" id="conn-pill">
      <div class="cs-dot"></div>
      <span id="conn-text">接続中...</span>
    </div>

    <div class="test-title">🎾 素振りテスト</div>
    <div class="test-subtitle">
      スマホを振るとPCから音が鳴ります。<br>
      ゲームを開始する前に動作を確認しましょう。
    </div>

    <div class="accel-display">
      <div class="accel-label">SWING POWER METER</div>
      <div class="swing-meter-wrap">
        <div class="swing-meter-fill" id="test-meter-fill"></div>
        <div class="swing-meter-thresh"></div>
      </div>
      <div class="swing-val" id="test-val">0.0</div>
      <div class="swing-status" id="test-status">スマホを振ってみてください</div>
    </div>

    <!-- MODE SELECTION -->
    <div style="width:100%;max-width:320px;">
      <div
        style="font-family:'Orbitron',monospace;font-size:0.55rem;letter-spacing:0.3em;color:rgba(255,255,255,0.35);text-align:center;margin-bottom:8px;">
        GAME MODE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;" id="mode-grid-phone">
        <button class="mode-btn active" id="pb-rally" onclick="phoneSelectMode('rally')">🎾 ラリー</button>
        <button class="mode-btn" id="pb-match" onclick="phoneSelectMode('match')">🏆 試合</button>
        <button class="mode-btn" id="pb-lesson" onclick="phoneSelectMode('lesson')">📚 レッスン</button>
        <button class="mode-btn" id="pb-wall" onclick="phoneSelectMode('wall')">🧱 壁打ち</button>
      </div>
    </div>

    <button class="perm-btn" id="perm-btn" style="display:none" onclick="reqPermission()">
      📡 センサーを有効化 (iOS)
    </button>

    <button class="test-ok-btn" onclick="goToPlay()">
      ▶ プレイ開始
    </button>

    <div style="font-size:0.65rem;color:rgba(255,255,255,0.25);text-align:center;">
      タップでも振りを代用できます
    </div>
  </div>

  <!-- ===== PLAY SCREEN ===== -->
  <div id="screen-play" class="screen">
    <div id="racket-bg"></div>
    <div id="racket-overlay"></div>

    <div class="play-top">
      <div class="play-brand">🎾 SMASH</div>
      <div class="conn-status connected" id="play-conn-pill" style="font-size:0.5rem;padding:4px 10px;">
        <div class="cs-dot"></div>
        <span>接続中</span>
      </div>
      <button class="quit-btn-small" onclick="quitPlay()">やめる</button>
    </div>

    <div class="play-score-area">
      <div class="play-score-lbl">SCORE</div>
      <div class="play-score-num" id="play-score">0</div>
    </div>

    <div class="swing-pulse" id="swing-btn" ontouchstart="onSwingTouch(event)" onclick="onSwingClick()">
      <div class="swing-emoji">🎾</div>
      <div class="swing-hint">SWING!</div>
    </div>

    <div class="power-bar-wrap">
      <div class="power-bar-label">POWER</div>
      <div class="power-bar-track">
        <div class="power-bar-fill" id="play-power-fill"></div>
      </div>
    </div>

    <!-- TOUCH ZONES: left half / right half for movement -->
    <div id="touch-zone-left" style="position:absolute;left:0;top:0;width:50%;height:100%;z-index:18;opacity:0;"
      ontouchstart="touchZonePress('left',event)" onclick="sendMove('left')">
    </div>
    <div id="touch-zone-right" style="position:absolute;right:0;top:0;width:50%;height:100%;z-index:18;opacity:0;"
      ontouchstart="touchZonePress('right',event)" onclick="sendMove('right')">
    </div>

    <!-- Scroll zone overlaid for fwd/back (transparent but captures wheel) -->
    <div id="scroll-zone" style="position:absolute;inset:0;z-index:17;" onwheel="onScrollMove(event)">
    </div>

    <!-- Visual hint arrows (bottom corners) -->
    <div style="position:absolute;bottom:30px;left:14px;z-index:20;font-size:1.1rem;opacity:0.35;pointer-events:none;">◀
      左</div>
    <div style="position:absolute;bottom:30px;right:14px;z-index:20;font-size:1.1rem;opacity:0.35;pointer-events:none;">
      右 ▶</div>
    <div
      style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:20;font-size:0.6rem;opacity:0.25;pointer-events:none;white-space:nowrap;">
      スクロール↕ = 前後移動</div>

    <div id="tilt-indicator">
      <div class="tilt-label">TILT</div>
      <div class="tilt-bar">
        <div class="tilt-dot" id="tilt-x-dot"></div>
      </div>
      <div class="tilt-bar">
        <div class="tilt-dot" id="tilt-y-dot"></div>
      </div>
    </div>
  </div>

  <div id="result-flash"></div>

  <script>
    // ============================================================
    //  PEER & STATE
    // ============================================================
    const params = new URLSearchParams(location.search);
    const tvPeerId = params.get('peer');
    let peer, conn;
    let score = 0;
    let cooldown = false;
    let motionActive = false;
    let lastMag = 0;
    const SWING_THRESHOLD = 15;     // Raw magnitude threshold
    let swingDetectedInTest = false;

    // ============================================================
    //  PEER INIT
    // ============================================================
    function initPeer() {
      if (!tvPeerId) {
        setConn('error', 'QRコードから接続してください');
        initMotion();
        return;
      }

      peer = new Peer(undefined, {
        host: '0.peerjs.com', port: 443, secure: true,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
      });

      peer.on('open', () => {
        conn = peer.connect(tvPeerId);
        conn.on('open', () => {
          setConn('connected', '✓ 接続完了');
          initMotion();
        });
        conn.on('data', onTVData);
        conn.on('close', () => setConn('error', '切断されました'));
        conn.on('error', () => setConn('error', 'エラー'));
      });

      peer.on('error', () => {
        setConn('error', '接続失敗 – オフラインモード');
        initMotion();
      });
    }

    function setConn(state, text) {
      ['conn-pill'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.className = 'conn-status ' + state; el.querySelector('span').textContent = text; }
      });
    }

    function onTVData(data) {
      if (data.type === 'result') {
        if (data.result === 'hit') {
          score = data.score;
          flashResult(true);
          animSwing('swung');
        } else if (data.result === 'miss') {
          flashResult(false);
        }
        updatePlayScore();
      } else if (data.type === 'gameover') {
        score = data.score;
        updatePlayScore();
        // Return to swing test screen so player can change mode
        setTimeout(() => {
          document.getElementById('screen-play').classList.remove('active');
          document.getElementById('screen-test').classList.add('active');
        }, 800);
      } else if (data.type === 'show_menu') {
        // PC returned to lobby – show test screen on phone too
        document.getElementById('screen-play').classList.remove('active');
        document.getElementById('screen-test').classList.add('active');
      }
    }

    // ============================================================
    //  MOTION
    // ============================================================
    function initMotion() {
      if (typeof DeviceMotionEvent === 'undefined') return;
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        document.getElementById('perm-btn').style.display = 'block';
      } else {
        enableMotion();
      }
    }

    function reqPermission() {
      DeviceMotionEvent.requestPermission().then(s => {
        if (s === 'granted') {
          document.getElementById('perm-btn').style.display = 'none';
          enableMotion();
        }
      }).catch(console.error);
    }

    function enableMotion() {
      motionActive = true;
      window.addEventListener('devicemotion', onMotion, { passive: true });
      window.addEventListener('deviceorientation', onOrientation, { passive: true });
    }

    function onMotion(e) {
      // Use raw accelerationIncludingGravity (reliable across all Android/iOS)
      const a = e.accelerationIncludingGravity || e.acceleration;
      if (!a) return;

      const mag = Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2);
      lastMag = mag;

      const pct = Math.min((mag / 50) * 100, 100);

      // Update test screen
      const testFill = document.getElementById('test-meter-fill');
      const testVal = document.getElementById('test-val');
      const testSt = document.getElementById('test-status');
      if (testFill) testFill.style.width = pct + '%';
      if (testVal) testVal.textContent = mag.toFixed(1);

      // Update play screen
      const playFill = document.getElementById('play-power-fill');
      if (playFill) playFill.style.width = pct + '%';

      // Ready glow
      document.getElementById('swing-btn')?.classList.toggle('ready', mag > 8);

      if (mag > SWING_THRESHOLD && !cooldown) {
        if (!swingDetectedInTest) {
          swingDetectedInTest = true;
          if (testSt) { testSt.textContent = '✓ 振り検出OK！PCから音が鳴りましたか？'; testSt.className = 'swing-status detected'; }
        }
        doSwing(Math.min(mag / 50, 1));
      }
    }

    function onOrientation(e) {
      const bg = document.getElementById('racket-bg');
      const beta = Math.max(-30, Math.min(30, (e.beta || 0) - 45));  // forward/back
      const gamma = Math.max(-25, Math.min(25, e.gamma || 0));         // left/right

      // Tilt racket image on phone
      if (bg) bg.style.transform = `rotate(${gamma * 0.4}deg) translateY(${beta * 0.5}px)`;

      // Tilt dots
      const tx = document.getElementById('tilt-x-dot');
      const ty = document.getElementById('tilt-y-dot');
      if (tx) tx.style.left = (50 + gamma * 1.5) + '%';
      if (ty) ty.style.left = (50 + beta * 1.0) + '%';

      // Stream tilt data to PC (throttled to ~20fps)
      if (conn && conn.open) {
        const now = Date.now();
        if (!onOrientation._last || now - onOrientation._last > 50) {
          onOrientation._last = now;
          conn.send({ type: 'tilt', x: gamma, y: beta });
        }
      }
    }

    // ============================================================
    //  SWING
    // ============================================================
    function onSwingTouch(e) {
      e.preventDefault();
      if (!cooldown) doSwing(motionActive ? Math.min(lastMag / 40, 1) : 0.75);
    }
    function onSwingClick() {
      if (!cooldown) doSwing(0.75);
    }

    function sendMove(dir) {
      if (conn && conn.open) conn.send({ type: 'move', dir });
    }

    // Touch zones: press left half = move left, right half = move right
    function touchZonePress(side, e) {
      // Don't trigger when tapping the swing button
      if (e.target.id === 'swing-btn' || e.target.closest('#swing-btn')) return;
      e.stopPropagation();
      sendMove(side);
    }

    // Scroll = move in any direction
    function onScrollMove(e) {
      e.preventDefault();
      const ax = Math.abs(e.deltaX), ay = Math.abs(e.deltaY);
      if (ax > ay) {
        // horizontal scroll → left/right
        if (e.deltaX < -5) sendMove('left');
        else if (e.deltaX > 5) sendMove('right');
      } else {
        // vertical scroll → forward/back
        if (e.deltaY < -5) sendMove('fwd');
        else if (e.deltaY > 5) sendMove('back');
      }
    }

    function doSwing(power) {
      if (cooldown) return;
      cooldown = true;

      // Tell PC to play swing sound
      if (conn && conn.open) {
        conn.send({ type: 'trigger_swing_sound' });
        conn.send({ type: 'swing', power });
      }

      animSwing('swung');
      vibrate([40, 20, 70]);

      // Flicker racket bg
      const bg = document.getElementById('racket-bg');
      if (bg) { bg.style.filter = 'brightness(1.2) saturate(1.3)'; setTimeout(() => { bg.style.filter = 'brightness(0.6) saturate(0.9)'; }, 120); }

      setTimeout(() => {
        cooldown = false;
        document.getElementById('swing-btn')?.classList.remove('swung');
      }, 380);
    }

    function animSwing(cls) {
      const btn = document.getElementById('swing-btn');
      if (!btn) return;
      btn.classList.remove('swung');
      void btn.offsetWidth;
      btn.classList.add(cls);
    }

    // ============================================================
    //  NAVIGATION
    // ============================================================
    // ============================================================
    //  NAVIGATION & MODE
    // ============================================================
    let selectedMode = 'rally';

    function phoneSelectMode(mode) {
      selectedMode = mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      const el = document.getElementById('pb-' + mode);
      if (el) el.classList.add('active');
      // Notify PC immediately (even before play starts)
      if (conn && conn.open) conn.send({ type: 'select_mode', mode });
    }

    function goToPlay() {
      // Send mode to PC before switching to play screen
      if (conn && conn.open) conn.send({ type: 'select_mode', mode: selectedMode });
      document.getElementById('screen-test').classList.remove('active');
      document.getElementById('screen-play').classList.add('active');
      setupSwipeZone();
    }

    function quitPlay() {
      if (conn && conn.open) conn.send({ type: 'quit_game' });
      document.getElementById('screen-play').classList.remove('active');
      document.getElementById('screen-test').classList.add('active');
    }

    // ============================================================
    //  SWIPE GESTURE CONTROLS (play screen)
    // ============================================================
    function setupSwipeZone() {
      const zone = document.getElementById('screen-play');
      let touchStartX = 0, touchStartY = 0;
      let lastSwipeTime = 0;

      zone.addEventListener('touchstart', e => {
        const t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
      }, { passive: true });

      zone.addEventListener('touchend', e => {
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const now = Date.now();
        if (now - lastSwipeTime < 200) return; // debounce
        if (dist < 25) return; // too small
        lastSwipeTime = now;

        if (Math.abs(dx) > Math.abs(dy)) {
          // Horizontal swipe
          sendMove(dx > 0 ? 'right' : 'left');
        } else {
          // Vertical swipe
          sendMove(dy > 0 ? 'back' : 'fwd');
        }
      }, { passive: true });
    }

    // ============================================================
    //  FEEDBACK
    // ============================================================
    function flashResult(hit) {
      const el = document.getElementById('result-flash');
      el.textContent = hit ? 'ナイス！' : 'ミス';
      el.style.color = hit ? '#f5c842' : '#e03030';
      el.style.textShadow = `0 0 40px ${hit ? '#f5c842' : '#e03030'}`;
      el.style.opacity = '1';
      el.style.transition = 'none';
      setTimeout(() => { el.style.transition = 'opacity 0.4s'; el.style.opacity = '0'; }, 550);
    }

    function updatePlayScore() {
      const el = document.getElementById('play-score');
      if (el) el.textContent = score;
    }

    function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

    // ============================================================
    //  INIT
    // ============================================================
    initPeer();
  </script>
</body>

</html>
